    <text class="col" x="648" y="10" style="animation: fall0 3.3s 0.1s infinite">Bi·Sb·In·Ga·Sn·Pb·Au·Ag·Pt</text>
  </g>

  <text class="line1" x="340" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#2C4A5A" letter-spacing="1">I'm Jiaxin</text>
  <text class="line2" x="340" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="400" fill="#4A7A94" font-style="italic">— you can call me Jessy.</text>
  <text class="line3" x="340" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="400" fill="#6A9FB5" letter-spacing="4">she/her</text>
  <text class="line4" x="340" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="400" fill="#4A7A94" letter-spacing="1">Materials Physics × Microelectronics</text>

